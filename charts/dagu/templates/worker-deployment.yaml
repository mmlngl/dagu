{{- range $poolName, $pool := .Values.workerPools }}
{{- if not (regexMatch "^[a-z][a-z0-9-]*$" $poolName) }}
{{- fail (printf "invalid workerPool name %q: must match ^[a-z][a-z0-9-]*$" $poolName) }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dagu.fullname" $ }}-worker-{{ $poolName }}
  labels:
    {{- include "dagu.labels" $ | nindent 4 }}
    app.kubernetes.io/component: worker
    dagu.sh/worker-pool: {{ $poolName }}
spec:
  replicas: {{ $pool.replicas }}
  selector:
    matchLabels:
      {{- include "dagu.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: worker
      dagu.sh/worker-pool: {{ $poolName }}
  template:
    metadata:
      labels:
        {{- include "dagu.labels" $ | nindent 8 }}
        app.kubernetes.io/component: worker
        dagu.sh/worker-pool: {{ $poolName }}
    spec:
      # Disable Kubernetes Service env var injection to avoid overriding
      # dagu config values (e.g., scheduler.port) with Service URLs
      enableServiceLinks: false
      {{- with $.Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          args:
            - dagu
            - worker
            - --config
            - /etc/dagu/dagu.yaml
            {{- if $pool.labels }}
            - --worker.labels
            - {{ include "dagu.workerLabels" $pool.labels | quote }}
            {{- end }}
          env:
            - name: DAGU_HOME
              value: /data
            - name: DAGU_WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
{{- with include "dagu.extraEnv" $ }}
{{ . | nindent 12 }}
{{- end }}
          ports:
            - name: health
              containerPort: {{ $.Values.worker.healthPort }}
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/dagu
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml $pool.resources | nindent 12 }}
      {{- with $pool.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $pool.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $pool.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "dagu.fullname" $ }}-data
        - name: config
          configMap:
            name: {{ include "dagu.fullname" $ }}-config
{{- end }}
